services:
    # Service PostgreSQL
    postgres:
      image: postgres:16-alpine
      container_name: my-favorite-places-db
      restart: unless-stopped
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: root
        POSTGRES_DB: my-favorite-places
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d my-favorite-places"]
        interval: 1m30s
        timeout: 30s
        retries: 5
        start_period: 30s

    # Service API Node.js
    server:
      image: ghcr.io/buldozer42/my-favorite-places-server:latest
      container_name: my-favorite-places-server
      restart: unless-stopped
      ports:
        - "3000:3000"
      environment:
        PORT: 3000
        DB_HOST: postgres
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: root
        DB_NAME: my-favorite-places
      depends_on:
        postgres:
          condition: service_healthy

    # Service client React servi par Nginx
    client:
      image: ghcr.io/buldozer42/my-favorite-places-client:latest
      container_name: my-favorite-places-client
      restart: unless-stopped
      ports:
        - "5173:80"
      depends_on:
        - server

volumes:
  postgres_data:
